<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | AURASOUND</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="login-page">
    <main class="login-shell">
      <section class="login-visual">
        <a class="logo" href="index.html">AURA<span>SOUND</span></a>
        <div>
          <p class="muted">Members get early deals</p>
          <h1>Unlock premium audio drops and checkout faster.</h1>
          <p>
            Sign in to continue shopping the latest wireless, studio, and gaming headphones.
          </p>
        </div>
      </section>

      <section class="glass login-card">
        <h2>Welcome Back</h2>
        <p class="muted">Use any email and password to enter this demo store.</p>
        <form id="loginForm" class="checkout-form">
          <input id="loginEmail" type="email" placeholder="Email address" required />
          <input id="loginPassword" type="password" placeholder="Password" minlength="4" required />
          <button class="btn btn-primary" type="submit">Login & Shop</button>
        </form>
      </section>
    </main>

    <script src="js/login.js"></script>
  </body>
</html>
