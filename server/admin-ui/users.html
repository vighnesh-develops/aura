<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Users | AURASOUND Admin</title>
    <link rel="stylesheet" href="/admin/admin.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="brand">AURA<span style="color: var(--accent)">ADMIN</span></div>
        <nav>
          <a href="/admin/dashboard.html">Dashboard</a>
          <a class="active" href="/admin/users.html">Users</a>
          <a href="/admin/products.html">Products</a>
          <a href="/admin/orders.html">Orders</a>
          <a href="/admin/messages.html">Messages</a>
          <a href="#" id="logoutLink">Logout</a>
        </nav>
      </aside>
      <main>
        <h1>Users</h1>
        <p style="color: var(--muted); margin-top: 0">Passwords are never shown.</p>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Email</th>
                <th>Role</th>
                <th>Created</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </main>
    </div>
    <script src="/admin/admin-shared.js"></script>
    <script>
      requireAdminSession().then(async (user) => {
        if (!user) return;
        document.getElementById("logoutLink").addEventListener("click", (e) => {
          e.preventDefault();
          logout();
        });
        const rows = await adminApi("/admin/api/users");
        document.getElementById("tbody").innerHTML = rows
          .map(
            (u) =>
              `<tr><td>${u.id}</td><td>${escapeHtml(u.email)}</td><td>${escapeHtml(u.role)}</td><td>${escapeHtml(
                u.created_at
              )}</td></tr>`
          )
          .join("");
      });

      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }
    </script>
  </body>
</html>
